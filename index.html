<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مقارنة المقاسات</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f7fbff;
    font-family:Tahoma,sans-serif;
    box-sizing:border-box;
}

.size-overlay{
    width:100%;
    display:flex;
    justify-content:center;
}

.size-modal{
    width:430px;
    max-width:95%;
    background:linear-gradient(180deg,#f0f8ff,#ffffff);
    border:1px solid #87CEEB;
    border-radius:24px;
    padding:24px;
    box-shadow:0 15px 35px rgba(70,130,180,.18);
    text-align:center;
}

.size-modal h3{
    margin:0 0 10px;
    color:#4682B4;
    font-size:20px;
    line-height:1.6;
}

.size-desc{
    margin:0 0 20px;
    color:#555;
    font-size:13px;
    line-height:1.8;
    font-weight:bold;
}

.size-preview{
    display:flex;
    align-items:flex-end;
    justify-content:space-around;
    height:270px;
    background:#fff;
    border-bottom:4px solid #87CEEB;
    border-radius:18px;
    padding:18px 12px 0;
    margin-bottom:22px;
    box-shadow:inset 0 0 18px rgba(135,206,235,.12);
}

.size-item{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
}

.size-label{
    position:absolute;
    top:-34px;
    background:#f0f8ff;
    color:#333;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
    box-shadow:0 4px 10px rgba(70,130,180,.08);
}

.human-svg{
    height:170px;
    width:auto;
    fill:#87CEEB;
    transition:height .35s ease;
    filter:drop-shadow(0 5px 10px rgba(70,130,180,.18));
}

.pot-bar{
    width:30px;
    height:60px;
    background:linear-gradient(180deg,#5f9ec8,#4682B4);
    border-radius:10px 10px 5px 5px;
    transition:all .35s ease;

    box-shadow:
        inset -4px -4px 8px rgba(0,0,0,.12),
        0 8px 14px rgba(70,130,180,.18);
}

.size-controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    text-align:right;
}

.control.full{
    grid-column:span 2;
}

.control label{
    display:block;
    margin-bottom:7px;
    color:#4682B4;
    font-size:13px;
    font-weight:bold;
}

.control input{
    width:100%;
    cursor:pointer;
    accent-color:#4682B4;
}

/* زر المتجر */

.store-box{
    margin-top:24px;
    display:flex;
    justify-content:center;
}

.store-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:linear-gradient(180deg,#5f9ec8,#4682B4);
    color:#fff !important;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
    padding:12px 24px;
    border-radius:999px;
    box-shadow:0 8px 18px rgba(70,130,180,.18);
    transition:all .3s ease;
}

.store-link:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 24px rgba(70,130,180,.25);
}

</style>

</head>

<body>

<div class="size-overlay">

    <div class="size-modal">

        <h3>مقارنة مقاسات المراكن والشلالات والنوافير</h3>

        <p class="size-desc">
            قارن مقاس المركن أو الشجرة الصناعية أو الشلال أو النافورة الذي رأيته في صفحة المنتج بطولك أنت
        </p>

        <div class="size-preview">

            <!-- الشخص -->
            <div class="size-item">

                <div class="size-label">
                    أنت |
                    الطول:
                    <span id="htmlUserVal">170</span> سم
                </div>

                <svg id="htmlHumanSvg" viewBox="0 0 100 320" class="human-svg">

                    <circle cx="50" cy="35" r="20"></circle>

                    <rect x="27" y="65" width="46" height="110" rx="12"></rect>

                    <rect x="13" y="75" width="10" height="100" rx="5"></rect>

                    <rect x="77" y="75" width="10" height="100" rx="5"></rect>

                    <rect x="34" y="160" width="12" height="150" rx="6"></rect>

                    <rect x="54" y="160" width="12" height="150" rx="6"></rect>

                </svg>

            </div>

            <!-- المنتج -->
            <div class="size-item">

                <div class="size-label">
                    المنتج |
                    الطول:
                    <span id="htmlPotVal">60</span> سم
                    |
                    العرض:
                    <span id="htmlPotWVal">30</span> سم
                </div>

                <div id="htmlPotBar" class="pot-bar"></div>

            </div>

        </div>

        <!-- أدوات التحكم -->
        <div class="size-controls">

            <div class="control full">

                <label>طولك الشخصي (سم)</label>

                <input
                    type="range"
                    id="htmlUserSlide"
                    min="100"
                    max="220"
                    value="170"
                >

            </div>

            <div class="control">

                <label>ارتفاع المنتج (سم)</label>

                <input
                    type="range"
                    id="htmlPotSlide"
                    min="10"
                    max="200"
                    value="60"
                >

            </div>

            <div class="control">

                <label>عرض المنتج (سم)</label>

                <input
                    type="range"
                    id="htmlPotWSlide"
                    min="10"
                    max="200"
                    value="30"
                >

            </div>

        </div>

        <!-- زر المتجر -->
        <div class="store-box">

            <a
                href="https://azharpapil.com/ar/?utm_source=dashboard&identifier=1616667539&expires=1778571276&signature=86619d60f7e619162a4bf5476c640b768ce80a75f1d307f2e8df0cbe4ecaa819"
                target="_blank"
                class="store-link"
            >

                🛒 زيارة المتجر

            </a>

        </div>

    </div>

</div>

<script>

function updateHtmlSizes(){

    const uVal =
        document.getElementById("htmlUserSlide").value;

    const pVal =
        document.getElementById("htmlPotSlide").value;

    const wVal =
        document.getElementById("htmlPotWSlide").value;

    /* تحديث الشخص */

    document.getElementById("htmlHumanSvg").style.height =
        uVal + "px";

    document.getElementById("htmlUserVal").innerText =
        uVal;

    /* تحديث المنتج */

    document.getElementById("htmlPotBar").style.height =
        pVal + "px";

    const visualWidth =
        wVal > 150 ? 150 : wVal;

    document.getElementById("htmlPotBar").style.width =
        visualWidth + "px";

    document.getElementById("htmlPotVal").innerText =
        pVal;

    document.getElementById("htmlPotWVal").innerText =
        wVal;
}

/* تشغيل أولي */

updateHtmlSizes();

/* الأحداث */

document.getElementById("htmlUserSlide")
.addEventListener("input", updateHtmlSizes);

document.getElementById("htmlPotSlide")
.addEventListener("input", updateHtmlSizes);

document.getElementById("htmlPotWSlide")
.addEventListener("input", updateHtmlSizes);

</script>

</body>
</html>
